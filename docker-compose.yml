services:
  postgres:
    image: postgres:16-alpine
    container_name: esoft_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-esoft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-esoft_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-esoft} -d ${POSTGRES_DB:-esoft_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: esoft_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-esoft}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-esoft_db}
      SESSION_SECRET: ${SESSION_SECRET}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:4321}
      NODE_ENV: production
    ports:
      - "4321:4321"
    # `docker compose watch` reconstruye la imagen y recrea el contenedor
    # automáticamente al detectar cambios en el código fuente o config.
    develop:
      watch:
        - action: rebuild
          path: ./src
        - action: rebuild
          path: ./public
        - action: rebuild
          path: ./astro.config.mjs
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./package-lock.json

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: esoft_pgadmin
    profiles: ["dev"]
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@esoft.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
